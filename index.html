<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi primera página web</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <h1>Mi Página Personal</h1>
    </header>

    <nav>
        <a href="#sobre-mi">Sobre mí</a>
        <a href="#sobre-el-proyecto-pec">Proyecto PEC</a>
    </nav>

    <section id="sobre-mi">
        <h2>Sobre mí</h2>

        <img 
            src="img/Tarjeta de Presentación Psicóloga Profesional Geométrico Rosa y Blanco.png"
            alt="Foto personal"
            width="300"
        >

        <p>Información personal.</p>
    </section>

    <section id="sobre-el-proyecto-pec">
        <h2>Sobre el proyecto PEC</h2>

        <p id="mensaje" style="display:none;">
            ¡Hola! Este es el mensaje oculto.
        </p>

        <button onclick="mostrarMensaje()">
            perros
        </button>

        <img 
            src="img/bnanner.png"
            alt="Banner"
            width="300"
        >

        <p>Información del proyecto.</p>
    </section>
    <script>
    // Mostrar botón al bajar
    window.onscroll = function () {
        let boton = document.getElementById("btnSubir");

        if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
            boton.style.display = "block";
        } else {
            boton.style.display = "none";
        }
    };

    // Subir arriba suavemente
    function subirArriba() {
        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });
    }
</script>

    <footer>
        <p>2026 - Mi nombre</p>
    </footer>

    <script>
        function mostrarMensaje() {
            const mensaje = document.getElementById("mensaje");

            if (mensaje.style.display === "none") {
                mensaje.style.display = "block";
            } else {
                mensaje.style.display = "none";
            }
        }
    </script>
    <!-- Botón de WhatsApp -->
<a 
    href="https://wa.me/5215512345678" 
    class="whatsapp"
    target="_blank"
>
    <img 
        src="https://cdn-icons-png.flaticon.com/512/220/220236.png" 
        alt="WhatsApp"
    >
</a>

<style>
    .whatsapp {
        position: fixed;
        bottom: 20px;
        left: 20px;
        width: 60px;
        height: 60px;
        z-index: 1000;
    }

    .whatsapp img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        box-shadow: 2px 2px 8px rgba(0,0,0,0.3);
        transition: transform 0.3s;
    }

    .whatsapp img:hover {
        transform: scale(1.1);
    }
</style>


</body>
</html>
