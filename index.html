<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Página</title>

<style>

/* General */
body{
    margin:0;
    padding:0;
    background-color:#0d1117;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
}

/* Encabezado */
header{
    background:#161b22;
    padding:20px;
    box-shadow:0 4px 8px rgba(0,0,0,0.3);
}

h1{
    color:#58a6ff;
}

/* Secciones */
section{
    background-color:#1e00a1;
    margin:20px auto;
    padding:20px;
    width:50%;
    border-radius:8px;
    box-shadow:0 4px 8px rgba(102,72,223,0.1);
}

/* Imágenes */
img{
    width:400px;
    height:auto;
    border-radius:10px;
    margin-top:10px;
}

/* Pie de página */
footer{
    background-color:#040449;
    color:#0a0679;
    text-align:center;
    padding:10px;
    margin-top:20px;
}

/* Botones */
button{
    padding:10px 20px;
    font-size:16px;
    background-color:#2fdb18;
    color:aqua;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:transform 0.1s, background-color 0.3s;
}

button:hover{
    background-color:#38ff1f;
}

button:active{
    transform:scale(0.95);
    background-color:bisque;
}

/* Mensaje oculto */
.mensaje{
    display:none;
    opacity:0;
    transform:translateY(20px);
    transition:all 0.5s ease;
    margin-top:15px;
    color:#fff;
    font-size:18px;
}

/* Mostrar mensaje */
.mensaje.mostrar{
    display:block;
    opacity:1;
    transform:translateY(0);
}

</style>
</head>

<body>

<header>
    <h1>Mi Página Web</h1>
</header>

<section>
    <h2>Bienvenido</h2>
    <p>Esta es una página de ejemplo creada con HTML, CSS y JavaScript.</p>

    <img src="https://picsum.photos/400/250" alt="Imagen ejemplo">

    <br><br>

    <button onclick="mostrarMensaje()">
        Haz clic
    </button>

    <div class="mensaje" id="mensaje">
        🎉 ¡Hola! El botón funciona correctamente.
    </div>
</section>

<footer>
    <p>© 2025 Mi Página</p>
</footer>

<script>

function mostrarMensaje(){
    const mensaje = document.getElementById("mensaje");
    mensaje.classList.toggle("mostrar");
}

</script>

</body>
</html>
