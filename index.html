<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi primera pagina web</title>
  <link rel="stylesheet" href="style.css"/>

  <style>
    button {
      background-color: #3498db;
      color: #020000;
      border: none;
      padding: 15px 25px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    button:active {
      transform: scale(0.95);
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .clicked {
      background-color: #00215e;
    }
  </style>
</head>

<body>



  <header>
    <h1>Mi Página Personal</h1>
      <button id="theme-toggle">🌙</button>
  </header>

  <nav>
    <a href="#sobre-mi">Sobre mí</a>
    <a href="#pec">Proyecto PEC</a>
  </nav>

  <section id="sobre-mi">
    <h2>Sobre mí</h2>
    <p id="mostrarmensajepersonal" style="display: none;"></p>
    <button onclick="mostrarmensajepersonal()">Botón Personal</button><br><br>

    <img src="img/Kevin Vásquez S Ing. Civil.png" alt="Foto personal" width="250" height="150">
    <p>Tengo 18 años, me gusta el básquet, soy muy inteligente jajaja, tengo un avión</p>
  </section>

  <section id="pec">
    <h2>Proyecto PEC</h2>

    <p id="mensaje" style="display:none;"></p>
    <button onclick="mostrarmensaje()">Botón PEC</button><br><br>

    <img src="img/baner.png" alt="Banner" width="250" height="150">
    <p>Cuidado de los perros y la comunidad</p>

    <button id="miBoton">
      <a href="https://wa.me/9518654273" target="_blank">
        <img src="WTSP.png" alt="WhatsApp" width="50">
      </a>
    </button>
  </section>

  <footer>
    <p>2026 - Mi nombre</p>
  </footer>

  <script src="script.js"></script>

  <script>
    const boton = document.getElementById("miBoton");

    boton.addEventListener("click", () => {
      boton.classList.toggle("clicked");
    });
  </script>
<!-- Botón flotante -->
<button id="btnTop" title="Ir arriba">↑</button>

<style>
#btnTop {
  display: none;
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 99;
  border: none;
  outline: none;
  background-color: #0aa2e9;
  color: rgb(13, 214, 171);
  cursor: pointer;
  padding: 12px 15px;
  border-radius: 50%;
  font-size: 20px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  transition: 0.3s;
}

#btnTop:hover {
  background-color: #000000;
}
</style>

<script>
// Mostrar botón al hacer scroll
window.onscroll = function() {
  const btn = document.getElementById("btnTop");

  if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
    btn.style.display = "block";
  } else {
    btn.style.display = "none";
  }
};

// Subir suavemente al inicio
document.getElementById("btnTop").addEventListener("click", function() {
  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
});
</script>
</body>
</html>
